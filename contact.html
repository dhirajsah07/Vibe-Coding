<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | AURELIA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Glassmorphism Header -->
    <header>
        <div class="logo"><a href="index.html">AURELIA</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Shop</a></li>
                <li><a href="about.html">Brand Story</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
        <div class="cart-icon">
            Cart (<span class="cart-count">0</span>)
        </div>
    </header>

    <!-- Slide-out Cart Drawer -->
    <div id="overlay" class="overlay"></div>
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Your Selection</h3>
            <button class="close-cart">&times;</button>
        </div>
        <div class="cart-items">
            <!-- Items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total</span>
                <span id="cart-total-amount">$0.00</span>
            </div>
            <a href="checkout.html" class="btn" style="display: block; text-align: center; width: 100%;">Proceed to Checkout</a>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        <div class="page-header">
            <h1>Private Inquiry</h1>
            <p>Connect with our dedicated client services team.</p>
        </div>
        
        <section>
            <div class="form-container">
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="inquiry">Your Inquiry</label>
                        <textarea id="inquiry" name="inquiry" rows="6" required></textarea>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;">Send Inquiry</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 AURELIA. All Rights Reserved. Crafted with Elegance.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
